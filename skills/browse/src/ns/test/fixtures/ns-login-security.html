<!DOCTYPE html>
<html>
<head><title>NetSuite Login</title></head>
<body>
<!--
  Mock NetSuite login page that redirects to the security question page.
  Used by ns login security question tests.
-->

<form id="loginForm">
  <input id="userName" type="text" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <input id="submitButton" type="submit" value="Log In" />
</form>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  // Redirect to security question page (mimics NS 2026.1 flow)
  window.location.href = '/app/login/secure/securityquestions.nl';
});
</script>
</body>
</html>
