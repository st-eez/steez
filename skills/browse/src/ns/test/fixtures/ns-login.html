<!DOCTYPE html>
<html>
<head><title>NetSuite Login</title></head>
<body>
<!--
  Mock NetSuite login page for testing ns login command.
  On form submit, redirects to ns-form.html (simulating successful login).
-->

<form id="loginForm">
  <input id="userName" type="text" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <input id="submitButton" type="submit" value="Log In" />
</form>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  // Simulate successful login — redirect to the NS form page
  window.location.href = '/ns-form.html';
});
</script>
</body>
</html>
