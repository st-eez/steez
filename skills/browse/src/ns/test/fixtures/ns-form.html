<!DOCTYPE html>
<html>
<head><title>NetSuite Form Stub</title></head>
<body>
<!--
  Mock NetSuite form for testing NS utilities.
  Provides stub nlapi* functions and DOM elements that mimic a real NS record page.
-->

<form id="main_form">
  <!-- Text field -->
  <input id="companyname" type="text" value="Acme Corp" />

  <!-- Select field (status) -->
  <select id="entitystatus">
    <option value="13">Customer - Closed Won</option>
    <option value="6" selected>Customer - Lead</option>
  </select>

  <!-- Entity-ref field (salesrep) with _display companion -->
  <input id="salesrep" type="hidden" value="42" />
  <span id="salesrep_display" style="display:none">Jane Smith</span>

  <!-- Disabled field -->
  <input id="formulatext" type="text" value="=SUM()" disabled />

  <!-- Mandatory currency field -->
  <input id="total" type="text" value="1500.00" />
</form>

<!-- Mock sublist (item lines) -->
<div id="item_splits">
  <table class="uir-machine-table">
    <thead>
      <tr>
        <td class="listheadertd"><div class="listheadertextb">Item</div></td>
        <td class="listheadertd"><div class="listheadertextb">Quantity</div></td>
        <td class="listheadertd"><div class="listheadertextb">Rate</div></td>
        <td class="listheadertd"><div class="listheadertextb">Amount</div></td>
      </tr>
    </thead>
  </table>
</div>

<!-- Error display elements (hidden by default) -->
<div id="_err_alert" style="display:none">Validation error: field required</div>
<div class="uir-message-error" style="display:none">Server error occurred</div>
<div class="uir-message-warning" style="display:none">Warning: duplicate record</div>

<!-- Save button (NS toolbar) -->
<button id="btn_multibutton_submitter" onclick="if(window.__saveBehavior === 'validation') { alert('Please enter a value for Company Name'); } else if(window.__saveBehavior === 'concurrency') { alert('This record has been changed since you started editing'); } else { var sep = window.location.href.indexOf('?') === -1 ? '?' : '&amp;'; window.location.href = window.location.href + sep + 'id=12345'; }">Save</button>

<!-- Mutation target for settle detection tests -->
<div id="mutation-target">initial content</div>

<script>
// ─── Mock NetSuite Client API ────────────────────────────────

const FIELDS = {
  companyname: {
    type: 'text', label: 'Company Name', mandatory: true, disabled: false,
    value: 'Acme Corp', text: 'Acme Corp',
  },
  entitystatus: {
    type: 'select', label: 'Status', mandatory: false, disabled: false,
    value: '6', text: 'Customer - Lead',
    options: [
      { id: '13', text: 'Customer - Closed Won' },
      { id: '6', text: 'Customer - Lead' },
      { id: '7', text: 'Customer - Prospect' },
    ],
  },
  salesrep: {
    type: 'select', label: 'Sales Rep', mandatory: false, disabled: false,
    value: '42', text: 'Jane Smith',
    // Entity-ref: has _display companion in DOM
  },
  formulatext: {
    type: 'text', label: 'Formula (Text)', mandatory: false, disabled: true,
    value: '=SUM()', text: '=SUM()',
  },
  total: {
    type: 'currency', label: 'Total', mandatory: true, disabled: false,
    value: '1500.00', text: '$1,500.00',
  },
};

window.nlapiGetField = function(id) {
  const f = FIELDS[id];
  if (!f) return null;
  return {
    getType: () => f.type,
    getLabel: () => f.label,
    isMandatory: () => f.mandatory,
    isDisabled: () => f.disabled,
    getSelectOptions: () => f.options || [],
  };
};

window.nlapiGetFieldValue = function(id) {
  const f = FIELDS[id];
  return f ? f.value : null;
};

window.nlapiGetFieldText = function(id) {
  const f = FIELDS[id];
  return f ? f.text : null;
};

window.nlapiGetFieldIds = function() {
  return Object.keys(FIELDS);
};

// ─── Mock save behavior ─────────────────────────────────────
// Set window.__saveBehavior to 'success' | 'validation' | 'concurrency'
// before clicking the save button to control the dialog that fires.
window.__saveBehavior = 'success';

// ─── Helpers for tests ───────────────────────────────────────

// Expose a function to trigger DOM mutations (for settle detection tests)
window.__mutateDOM = function(text) {
  document.getElementById('mutation-target').textContent = text;
};

// Mock nlapiSetFieldValue (NS set field API)
window.nlapiSetFieldValue = function(fieldId, value, fireSlavingWhenever, fireFieldChanged) {
  if (!FIELDS[fieldId]) return;
  FIELDS[fieldId].value = value;
  FIELDS[fieldId].text = value;

  // Simulate sourcing cascade for entity-ref fields
  if (!fireSlavingWhenever && fieldId === 'salesrep') {
    // Simulate async sourcing — after a short delay, update dependent fields
    setTimeout(function() {
      FIELDS['companyname'].value = 'Sourced Company';
      FIELDS['companyname'].text = 'Sourced Company';
    }, 100);
  }
};

// Mock nlapiCancel (NS cancel API)
window.nlapiCancel = function() { return true; };

// Mock sublist APIs
var SUBLIST_LINES = {
  item: [
    { item: '100', quantity: '5', rate: '10.00', amount: '50.00' },
    { item: '200', quantity: '3', rate: '20.00', amount: '60.00' },
  ],
};
var CURRENT_LINE = {};

window.nlapiGetLineItemCount = function(sublistId) {
  return (SUBLIST_LINES[sublistId] || []).length;
};

window.nlapiGetLineItemValue = function(sublistId, fieldId, line) {
  var lines = SUBLIST_LINES[sublistId] || [];
  if (line >= 1 && line <= lines.length) {
    return lines[line - 1][fieldId] || '';
  }
  return '';
};

window.nlapiSelectNewLineItem = function(sublistId) {
  CURRENT_LINE = { _sublist: sublistId };
};

window.nlapiSetCurrentLineItemValue = function(sublistId, fieldId, value, fsw, ffc) {
  CURRENT_LINE[fieldId] = value;
  // Simulate sourcing: setting 'item' cascades to rate/amount after delay
  if (!fsw && fieldId === 'item') {
    setTimeout(function() {
      CURRENT_LINE['rate'] = '25.00';
      CURRENT_LINE['amount'] = String(parseFloat(CURRENT_LINE['quantity'] || '1') * 25);
    }, 80);
  }
};

window.nlapiGetCurrentLineItemValue = function(sublistId, fieldId) {
  return CURRENT_LINE[fieldId] || null;
};

window.nlapiCommitLineItem = function(sublistId) {
  if (!SUBLIST_LINES[sublistId]) SUBLIST_LINES[sublistId] = [];
  var line = Object.assign({}, CURRENT_LINE);
  delete line._sublist;
  SUBLIST_LINES[sublistId].push(line);
  CURRENT_LINE = {};
};

// Expose a function to show/hide error modals
window.__showError = function(selector) {
  const el = document.querySelector(selector);
  if (el) el.style.display = 'block';
};

window.__hideError = function(selector) {
  const el = document.querySelector(selector);
  if (el) el.style.display = 'none';
};
</script>
</body>
</html>
