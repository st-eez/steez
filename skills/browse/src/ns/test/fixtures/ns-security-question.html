<!DOCTYPE html>
<html>
<head><title>Security Question</title></head>
<body>
<!--
  Mock NetSuite security question page.
  Mirrors the real 2026.1 page: unlabeled text input, unlabeled Submit button,
  question text in a plain <p> element. No IDs, no name attributes.
  Playwright aria snapshot shows these as @e2 (textbox) and @e4 (Submit button).
-->

<div>
  <p>What is your favorite color?</p>
  <input type="text" />
  <input type="submit" value="Submit" />
</div>

<script>
document.querySelector('input[type="submit"]').addEventListener('click', function(e) {
  e.preventDefault();
  // Simulate successful answer — redirect to the NS form page (dashboard)
  window.location.href = '/ns-form.html';
});
</script>
</body>
</html>
